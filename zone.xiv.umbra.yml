app-id: zone.xiv.umbra
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: umbra
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
cleanup:
  # dev files
  - /share/cmake
  - /share/kdevappwizard
  - /include
  - /lib/cmake
  - /lib/x86_64-linux-gnu/cmake
  - /lib/x86_64-linux-gnu/pkgconfig
  - /mkspecs
finish-args:
  # Needed for X11, once we can remove that... remove this too
  - --share=ipc
  # We can switch to fallback-x11 once the Wine Wayland driver is on par with just running it through XWayland
  - --socket=x11
  - --socket=wayland
  - --share=network
  # Default directory for screenshots
  - --filesystem=xdg-pictures:rw
  - --socket=pulseaudio
  # Allow access to the GNOME secret service API and to talk to the GNOME keyring daemon
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gnome.keyring
  # Allow to talk to the KDE kwallet daemon
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --device=all
modules:
  - name: qtkeychain
    cleanup:
      - /bin
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_WITH_QT6=ON
      - -DCMAKE_INSTALL_LIBDIR=/app/lib
      - -DLIB_INSTALL_DIR=/app/lib
      - -DBUILD_TRANSLATIONS=NO
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: archive
        url: https://github.com/frankosterfeld/qtkeychain/archive/refs/tags/0.15.0.tar.gz
        sha256: f4254dc8f0933b06d90672d683eab08ef770acd8336e44dfa030ce041dc2ca22
  - name: corrosion
    buildsystem: cmake-ninja
    config-opts:
      - -DCORROSION_BUILD_TESTS=OFF
    build-options:
      env:
        - CARGO_HOME: /run/build/corrosion/cargo
    cleanup:
      - /app
    sources:
      - type: archive
        url: https://github.com/corrosion-rs/corrosion/archive/refs/tags/v0.5.2.tar.gz
        sha256: 6bc02411e29183a896aa60c58db6819ec6cf57c08997481d0b0da9029356b529
  - name: umbra
    buildsystem: cmake-ninja
    config-opts:
      - -DRust_COMPILER=/usr/lib/sdk/rust-stable/bin/rustc
      - -DBUILD_FLATPAK=ON
      - -DCMAKE_INSTALL_LIBDIR=/app/lib
      - -DLIB_INSTALL_DIR=/app/lib
      - -DBUILD_TESTING=OFF
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    build-options:
      build-args:
        - --share=network # needed for cargo unfortunately, flatpak has no native support (yet)
    sources:
      - type: dir
        path: .
    cleanup:
      - /lib/debug/source/umbra/launcher/.rcc # debug symbols for the auto-gen C++ source for QML is useless
